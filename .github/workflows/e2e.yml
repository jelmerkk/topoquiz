name: E2E Tests

on:
  push:
    branches: [staging]
  pull_request:
    branches: [main]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run unit tests with coverage
        run: npm run test:coverage
      - name: Run Playwright tests
        run: npx playwright test
      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Merge staging into main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          git merge staging --ff-only
          git push origin main

      - name: Deploy to Uberspace via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete --include='index.html' --include='cities.js' --include='sw.js' --include='manifest.json' --include='provincie_2023.geojson' --include='wateren.geojson' --include='gewesten.geojson' --include='landen-europa.geojson' --include='landen-zuidamerika.geojson' --include='landen-afrika.geojson' --include='landen-noord-midden-amerika.geojson' --include='landen-midden-oosten.geojson' --include='landen-zuid-azie.geojson' --include='landen-oost-azie.geojson' --include='sitemap.xml' --include='icon.svg' --include='.htaccess' --exclude='*'
          path: ./
          remote_path: ${{ vars.UBERSPACE_DEPLOY_PATH }}/
          remote_host: ${{ vars.UBERSPACE_SSH_HOST }}
          remote_user: ${{ vars.UBERSPACE_SSH_USER }}
          remote_key: ${{ secrets.UBERSPACE_SSH_KEY }}
