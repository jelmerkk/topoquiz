name: Deploy to Uberspace

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete --include='index.html' --include='cities.js' --include='sw.js' --include='manifest.json' --include='provincie_2023.geojson' --include='sitemap.xml' --include='icon.svg' --include='.htaccess' --exclude='*'
          path: ./
          remote_path: ${{ vars.UBERSPACE_DEPLOY_PATH }}/
          remote_host: ${{ vars.UBERSPACE_SSH_HOST }}
          remote_user: ${{ vars.UBERSPACE_SSH_USER }}
          remote_key: ${{ secrets.UBERSPACE_SSH_KEY }}
