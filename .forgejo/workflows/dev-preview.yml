# Cloudflare Workers preview voor elke push naar dev.
# Vervangt de oude CF-Pages Git-integratie (die Codeberg-repos niet
# ondersteunt) én de Pages-deploy die niet meer werkt — de productie-
# Worker `topoquiz` (Static Assets via wrangler.jsonc) is canonical.
#
# `wrangler versions upload` publisht een preview-versie van de Worker
# zonder het production-traffic te verplaatsen. Het commando print de
# preview-URL (vorm: <hash>-topoquiz.jelmer-fff.workers.dev) — die check
# je voor visuele verificatie. Geen tests hier: dev-preview is voor
# user-akkoord, e2e.yml is de CI-gate.

name: Dev preview

on:
  push:
    branches: [dev]

jobs:
  preview:
    runs-on: self-hosted
    container:
      image: node:20-bookworm
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v4

      - name: Install wrangler
        run: npm install -g wrangler@4

      - name: Upload dev preview version
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          wrangler versions upload \
            --message="dev push: ${{ github.sha }}" \
            --tag="dev-${GITHUB_SHA::7}"

      # Bij failure: wrangler-log + workflow-context naar ntfy + bewaar als
      # artifact zodat de oorzaak achteraf op te halen is via de Forgejo API.
      - name: Collect wrangler log on failure
        if: failure()
        run: |
          mkdir -p /tmp/ci-logs
          cp /root/.config/.wrangler/logs/*.log /tmp/ci-logs/ 2>/dev/null || true
          echo "branch=${{ github.ref_name }}"  >  /tmp/ci-logs/context.txt
          echo "sha=${{ github.sha }}"          >> /tmp/ci-logs/context.txt
          echo "workflow=${{ github.workflow }}" >> /tmp/ci-logs/context.txt
          echo "run=${{ github.run_number }}"    >> /tmp/ci-logs/context.txt

      - name: Upload wrangler log artifact on failure
        if: failure()
        uses: https://code.forgejo.org/actions/upload-artifact@v4
        with:
          name: wrangler-logs-dev-${{ github.run_number }}
          path: /tmp/ci-logs/
          retention-days: 14

      - name: Notify ntfy on failure
        if: failure()
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          if [ -z "${NTFY_TOPIC:-}" ]; then echo "NTFY_TOPIC unset, skipping notify"; exit 0; fi
          tail_log=$(tail -40 /tmp/ci-logs/*.log 2>/dev/null | head -c 1500 || echo "(no wrangler log captured)")
          msg=$(printf 'Branch: %s\nCommit: %s\n\n--- last 40 lines ---\n%s' \
            "${{ github.ref_name }}" "${{ github.sha }}" "$tail_log")
          curl --silent --show-error \
            -H "Title: Codeberg CI failed — dev-preview" \
            -H "Priority: high" \
            -H "Tags: warning" \
            -H "Click: https://codeberg.org/jelmerk/topoquiz/actions" \
            -d "$msg" \
            "https://ntfy.sh/${NTFY_TOPIC}"
