<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Landen debug</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>html,body,#map{margin:0;height:100vh}.lbl{background:none;border:none;box-shadow:none;font-weight:bold;font-size:11px;color:#111;text-shadow:0 0 2px #fff,0 0 2px #fff}</style>
</head>
<body>
<div id="map"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([55, 15], 4);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// Kleurenwiel voor de 40 landen; gebruikt hash van naam → hue.
function color(name) {
  let h = 0;
  for (const c of name) h = (h * 31 + c.charCodeAt(0)) >>> 0;
  return `hsl(${h % 360}, 65%, 55%)`;
}

fetch('landen-europa.geojson').then(r => r.json()).then(gj => {
  L.geoJSON(gj, {
    style: f => ({
      color: '#222', weight: 1,
      fillColor: color(f.properties.name), fillOpacity: 0.55,
    }),
    onEachFeature: (f, layer) => {
      const name = f.properties.name;
      const sets = (f.properties.sets || []).join(',');
      layer.bindTooltip(`${name} [${sets}]`, { permanent: true, direction: 'center', className: 'lbl' });
    },
  }).addTo(map);
});
</script>
</body>
</html>
