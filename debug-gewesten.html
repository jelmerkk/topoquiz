<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Gewesten debug</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>html,body,#map{margin:0;height:100vh}</style>
</head>
<body>
<div id="map"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const map = L.map('map').setView([48, 5], 5);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

fetch('gewesten.geojson').then(r=>r.json()).then(gj => {
  L.geoJSON(gj, {
    style: () => ({ color: '#1e40af', weight: 2, fillColor: '#3b82f6', fillOpacity: 0.35 }),
    onEachFeature: (f, layer) => {
      layer.bindTooltip(f.properties.name, { permanent: true, direction: 'center', className: 'lbl' });
    }
  }).addTo(map);
});
</script>
<style>.lbl{background:none;border:none;box-shadow:none;font-weight:bold;font-size:11px;color:#000}</style>
</body>
</html>
