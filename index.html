<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', sans-serif;
  background: #1a2744;
  color: #fff;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 10px;
  gap: 8px;
}
h1 { font-size: 1rem; color: #f0c040; text-align: center; }

/* ── Start screen ── */
#start-screen {
  display: none;
  background: #243060;
  border-radius: 16px;
  padding: 32px 24px;
  text-align: center;
  max-width: 680px;
  width: 100%;
}
#start-screen h2 { font-size: 1.4rem; color: #f0c040; margin-bottom: 6px; }
#start-screen p  { color: #8ab4f8; font-size: 0.9rem; margin-bottom: 22px; }
.mode-btn {
  display: block;
  width: 100%;
  padding: 14px 16px;
  margin-bottom: 10px;
  background: #1a2744;
  border: 2px solid #3a4f88;
  color: #fff;
  border-radius: 10px;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  text-align: left;
  transition: all 0.12s;
}
@media (hover: hover) { .mode-btn:hover { background: #2c3d6e; border-color: #6080cc; } }
.mode-btn .mode-desc {
  display: block;
  font-size: 0.8rem;
  font-weight: 400;
  color: #8ab4f8;
  margin-top: 3px;
}
#back-btn {
  margin-top: 6px;
  background: none;
  border: none;
  color: #8ab4f8;
  font-size: 0.85rem;
  cursor: pointer;
  text-decoration: underline;
}
@media (hover: hover) { #back-btn:hover { color: #fff; } }
#reset-btn, #quit-btn {
  background: none;
  border: none;
  font-size: 1rem;
  cursor: pointer;
  opacity: 0.5;
  padding: 0 2px;
  line-height: 1;
}
@media (hover: hover) { #reset-btn:hover { opacity: 1; } }
@media (hover: hover) { #quit-btn:hover { opacity: 1; } }
#fb-btn {
  background: none;
  border: none;
  font-size: 1rem;
  cursor: pointer;
  opacity: 0.5;
  padding: 0 2px;
  line-height: 1;
}
@media (hover: hover) { #fb-btn:hover { opacity: 1; } }

/* ── Score bar ── */
#score-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  width: 100%;
  max-width: 680px;
  font-size: 0.9rem;
  color: #8ab4f8;
  gap: 8px;
}
#progress-wrap {
  flex: 1;
  background: #0e1830;
  border-radius: 8px;
  height: 8px;
  overflow: hidden;
}
#progress-bar {
  height: 100%;
  background: linear-gradient(90deg, #4caf50, #8bc34a);
  border-radius: 8px;
  transition: width 0.5s;
  width: 0%;
}
.sc-mastered { color: #4caf50; font-weight: 700; }
.sc-ok  { color: #4caf50; font-weight: 700; }
.sc-err { color: #f44336; font-weight: 700; }

/* ── Map ── */
#map-wrap {
  width: 100%;
  max-width: 680px;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
#leaflet-map {
  height: clamp(300px, 52dvh, 580px);
  width: 100%;
}
.leaflet-control-attribution { font-size: 9px !important; }

/* ── Hoofdstad-markering (vierkant) ── */
.capital-marker {
  background: #4a5a80;
  border: 1.5px solid #1a2744;
  box-shadow: 0 1px 4px rgba(0,0,0,0.45);
}

/* ── Pulse marker ── */
.pulse-wrap { position: relative; width: 0; height: 0; }
.pulse-ring {
  position: absolute;
  width: 30px; height: 30px;
  border: 3px solid #f44336;
  border-radius: 50%;
  top: -15px; left: -15px;
  animation: pulse 1.4s ease-out infinite;
  pointer-events: none;
}
.pulse-dot {
  position: absolute;
  width: 14px; height: 14px;
  background: #f44336;
  border: 2px solid #fff;
  border-radius: 50%;
  top: -7px; left: -7px;
  box-shadow: 0 0 6px rgba(0,0,0,0.5);
}
@keyframes pulse {
  0%   { transform: scale(0.5); opacity: 1; }
  100% { transform: scale(2.4); opacity: 0; }
}

/* ── Question box ── */
#question-box {
  background: #243060;
  border-radius: 12px;
  padding: 14px 18px;
  width: 100%;
  max-width: 680px;
  text-align: center;
}
#question-text {
  font-size: 1rem;
  color: #c8d8f8;
  margin-bottom: 12px;
  font-weight: 600;
}

/* Multiple choice options */
#options {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 10px;
}
.opt {
  background: #1a2744;
  border: 2px solid #3a4f88;
  color: #fff;
  padding: 11px 8px;
  border-radius: 9px;
  font-size: 0.92rem;
  cursor: pointer;
  transition: all 0.12s;
  font-weight: 500;
  line-height: 1.2;
}
@media (hover: hover) { .opt:hover:not(:disabled) { background: #2c3d6e; border-color: #6080cc; } }
.opt.correct { background: #1b5e20; border-color: #4caf50; }
.opt.wrong   { background: #b71c1c; border-color: #f44336; }
.opt:disabled { cursor: default; }

/* Text input mode */
#text-input-wrap { display: none; margin-bottom: 10px; }
#hint-display {
  font-size: 0.85rem;
  color: #f0c040;
  min-height: 20px;
  margin-bottom: 6px;
  font-weight: 600;
}
#text-row { display: flex; gap: 6px; }
#city-input {
  flex: 1;
  padding: 10px 12px;
  background: #1a2744;
  border: 2px solid #3a4f88;
  border-radius: 9px;
  color: #fff;
  font-size: 0.95rem;
}
#city-input:focus { outline: none; border-color: #6080cc; }
#city-input:disabled { opacity: 0.6; }
#hint-btn {
  padding: 10px 12px;
  background: #1a2744;
  border: 2px solid #f0c04066;
  border-radius: 9px;
  color: #f0c040;
  font-size: 0.9rem;
  cursor: pointer;
  white-space: nowrap;
}
@media (hover: hover) { #hint-btn:hover:not(:disabled) { background: #2c3d6e; } }
#hint-btn:disabled { opacity: 0.4; cursor: default; }

/* Feedback */
#feedback {
  font-size: 0.95rem;
  font-weight: 600;
  min-height: 22px;
  margin-bottom: 8px;
}
.fb-ok    { color: #4caf50; }
.fb-close { color: #f0c040; }
.fb-err   { color: #f44336; }

#next-btn { display: none; }

/* ── Hard panel ── */
#hard-panel {
  display: none;
  background: #243060;
  border-radius: 10px;
  padding: 10px 14px;
  width: 100%;
  max-width: 680px;
}
#hard-panel h3 { color: #f0c040; font-size: 0.85rem; margin-bottom: 6px; }
#hard-list { list-style: none; display: flex; flex-wrap: wrap; gap: 5px; }
#hard-list li {
  background: #b71c1c33;
  border: 1px solid #f4433644;
  padding: 2px 9px;
  border-radius: 20px;
  font-size: 0.8rem;
  color: #ef9a9a;
}
#hard-list li b { color: #fff; }

/* ── End screen ── */
#end-screen {
  display: none;
  background: #243060;
  border-radius: 16px;
  padding: 36px 28px;
  text-align: center;
  max-width: 680px;
  width: 100%;
}
#end-screen h2 { font-size: 2rem; color: #f0c040; margin-bottom: 12px; }
#end-screen p  { color: #8ab4f8; margin-bottom: 24px; font-size: 1.05rem; line-height: 1.6; }
#restart-btn {
  padding: 13px 30px;
  background: #f0c040;
  color: #1a2744;
  border: none;
  border-radius: 10px;
  font-size: 1.05rem;
  font-weight: 700;
  cursor: pointer;
}

/* ── Feedback modal ── */
#fb-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 9000;
  align-items: center;
  justify-content: center;
}
#fb-overlay.open { display: flex; }
#fb-modal {
  background: #243060;
  border-radius: 16px;
  padding: 28px 24px;
  width: min(460px, 92vw);
  display: flex;
  flex-direction: column;
  gap: 12px;
}
#fb-modal h3 { color: #f0c040; font-size: 1.05rem; }
#fb-modal > p { color: #8ab4f8; font-size: 0.83rem; line-height: 1.5; }
.fb-type-row { display: flex; gap: 8px; }
.fb-type-btn {
  flex: 1;
  padding: 10px;
  background: #1a2744;
  border: 2px solid #3a4f88;
  color: #fff;
  border-radius: 9px;
  font-size: 0.88rem;
  cursor: pointer;
  transition: border-color 0.12s, background 0.12s;
}
.fb-type-btn.selected { border-color: #f0c040; background: #2c3d6e; }
#fb-desc, #fb-name {
  width: 100%;
  padding: 10px 12px;
  background: #1a2744;
  border: 2px solid #3a4f88;
  border-radius: 9px;
  color: #fff;
  font-size: 0.92rem;
  font-family: inherit;
}
#fb-desc { resize: vertical; min-height: 80px; }
#fb-desc:focus, #fb-name:focus { outline: none; border-color: #6080cc; }
#fb-name::placeholder, #fb-desc::placeholder { color: #4a5a80; }
.fb-btn-row { display: flex; gap: 8px; justify-content: flex-end; }
#fb-cancel {
  padding: 9px 18px;
  background: none;
  border: 2px solid #3a4f88;
  color: #8ab4f8;
  border-radius: 9px;
  cursor: pointer;
  font-size: 0.9rem;
}
#fb-submit {
  padding: 9px 20px;
  background: #f0c040;
  color: #1a2744;
  border: none;
  border-radius: 9px;
  font-weight: 700;
  cursor: pointer;
  font-size: 0.9rem;
}
#fb-submit:disabled { opacity: 0.5; cursor: default; }
#fb-thanks { display: none; text-align: center; padding: 12px 0; color: #4caf50; font-weight: 600; }
.fb-open-btn {
  background: none; border: none;
  color: #3a4f88; font-size: 0.78rem;
  cursor: pointer; text-decoration: underline;
  display: block; margin: 8px auto 0;
}
@media (hover: hover) { .fb-open-btn:hover { color: #8ab4f8; } }

/* ── Responsive ── */
@media (min-width: 768px) {
  body { padding: 14px; gap: 12px; }
  h1 { font-size: 1.3rem; }
  #map-wrap, #question-box, #score-bar, #hard-panel, #end-screen, #start-screen { max-width: 900px; }
  #leaflet-map { height: clamp(500px, 66dvh, 740px); }
}
@media (max-width: 480px) {
  body { padding: 6px; gap: 5px; height: 100dvh; overflow: hidden; }
  h1 { font-size: 0.82rem; }
  #score-bar { font-size: 0.78rem; gap: 5px; }
  #map-wrap { flex: 1; min-height: 0; }
  #leaflet-map { height: 100%; }
  #question-box { padding: 9px 11px; }
  #question-text { font-size: 0.88rem; margin-bottom: 8px; }
  #options { gap: 6px; margin-bottom: 7px; }
  .opt { padding: 9px 6px; font-size: 0.82rem; }
  #feedback { font-size: 0.82rem; min-height: 18px; margin-bottom: 5px; }
}

<body>

<h1>🗺️ Topografie Quiz</h1>

<div id="start-screen">
  <!-- Stap 1: kies een toets -->
  <div id="level-select">
    <h2>🗺️ Topografie Quiz</h2>
    <p>Kies een toets:</p>
    <!-- dynamisch gevuld door showStartScreen() -->
  </div>
  <!-- Stap 2: kies een oefenmodus -->
  <div id="mode-select" style="display:none">
    <h2 id="start-level-name"></h2>
    <p>Hoe wil jij oefenen?</p>
    <button class="mode-btn" onclick="startQuiz('mc')">
      🔤 Meerkeuze
      <span class="mode-desc">Je ziet een stip op de kaart en kiest de juiste naam uit vier opties. Goed om te beginnen!</span>
    </button>
    <button class="mode-btn" onclick="startQuiz('text')">
      ✏️ Zelf typen
      <span class="mode-desc">Je typt de naam van de plaats zelf in. Ook de spelling telt — net als op de echte toets! Hints beschikbaar.</span>
    </button>
    <button id="back-btn" onclick="history.back()">← Andere toets</button>
    <button class="fb-open-btn" onclick="openFeedback()">💬 Feedback of fout melden</button>
  </div>
</div>

<div id="score-bar" style="display:none">
  <span>🌟 <span id="sc-mastered" class="sc-mastered">0</span>/<b id="qtot">46</b> geleerd</span>
  <div id="progress-wrap"><div id="progress-bar"></div></div>
  <span>✅ <span id="sc-ok" class="sc-ok">0</span> &nbsp;❌ <span id="sc-err" class="sc-err">0</span></span>
  <button id="reset-btn" onclick="resetQuiz()" title="Opnieuw beginnen">🔄</button>
  <button id="quit-btn" onclick="showStartScreen()" title="Andere quiz kiezen">🗺️</button>
  <button id="fb-btn" onclick="openFeedback()" title="Feedback geven" style="margin-left:-4px">💬</button>
</div>

<div id="map-wrap" style="display:none">
  <div id="leaflet-map"></div>
</div>

<div id="question-box" style="display:none">
  <div id="question-text">Welke plaats is dit?</div>
  <div id="options"></div>
  <div id="text-input-wrap">
    <div id="hint-display"></div>
    <div id="text-row">
      <input id="city-input" type="text" autocomplete="off" autocorrect="off" spellcheck="false" placeholder="Typ de naam…">
      <button id="hint-btn" onclick="showHint()">Hint 💡</button>

  </div>
  <div id="feedback"></div>
  <button id="next-btn">Volgende →</button>
</div>

<div id="hard-panel">
  <h3>🔁 Nog even oefenen:</h3>
  <ul id="hard-list"></ul>
</div>

<div id="end-screen">
  <h2>🎉 Gefeliciteerd!</h2>
  <p id="end-text"></p>
  <button id="restart-btn" onclick="showStartScreen()">Nog een keer! 🔄</button>
  <button class="fb-open-btn" onclick="openFeedback()">💬 Feedback of fout melden</button>
</div>

<!-- Feedback modal -->
<div id="fb-overlay" onclick="if(event.target===this)closeFeedback()">
  <div id="fb-modal">
    <h3>💬 Feedback geven</h3>
    <p>Iets gevonden dat niet klopt, of een idee? Laat het weten!</p>
    <div id="fb-form">
      <div class="fb-type-row">
        <button class="fb-type-btn selected" onclick="selectFbType(this,'Bug 🐛')">🐛 Iets klopt niet</button>
        <button class="fb-type-btn" onclick="selectFbType(this,'Suggestie 💡')">💡 Idee / suggestie</button>
      </div>
      <textarea id="fb-desc" placeholder="Beschrijf het hier…"></textarea>
      <input id="fb-name" type="text" placeholder="Jouw naam (optioneel)">
      <div class="fb-btn-row">
        <button id="fb-cancel" onclick="closeFeedback()">Annuleren</button>
        <button id="fb-submit" onclick="submitFeedback()">Versturen →</button>
      </div>
    </div>
    <div id="fb-thanks">✅ Bedankt voor je feedback!</div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const NL_BOUNDS = [[50.699, 3.325], [53.566, 7.261]];

const map = L.map('leaflet-map', {
  zoomControl: true,
  dragging: true,
  scrollWheelZoom: true,
  doubleClickZoom: true,
  boxZoom: false,
  keyboard: false,
  touchZoom: true,
});

// FEATURE FLAG: zet op true voor CARTO Voyager tiles (geen plaatsnamen, open-source)
//               zet op false voor originele TopoMania tiles
// Let op: donkere kaart (dark_nolabels) is NIET geschikt — doelgroep zijn kinderen in groep 5
// die de kaart moeten kunnen herkennen. Gebruik altijd een lichte, vertrouwde kaartstijl.
const USE_CARTO_TILES = true;

const tileLayer = USE_CARTO_TILES
  ? L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager_nolabels/{z}/{x}/{y}{r}.png', {
      attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors © <a href="https://carto.com/">CARTO</a>',
      subdomains: 'abcd',
      minZoom: 6, maxZoom: 19,
    })
  : L.tileLayer('https://www.topomania.net/styles/topomania-nonames/{z}/{x}/{y}.png', {
      attribution: '© <a href="https://www.topomania.net">TopoMania</a>',
      minZoom: 6, maxZoom: 10,
    });

tileLayer.addTo(map);

// Provincie-stijlen
const PROV_BORDER    = { color: '#666', weight: 1.2, opacity: 0.55, fill: false, dashArray: '5 4' };
const PROV_DEFAULT   = { color: '#5a7aaa', weight: 1.5, opacity: 0.7,  fillColor: '#8ab4f8', fillOpacity: 0.2  };
const PROV_HIGHLIGHT = { color: '#c07000', weight: 2.5, opacity: 1,    fillColor: '#f0a500', fillOpacity: 0.6  };
const PROV_MASTERED  = { color: '#1b5e20', weight: 2,   opacity: 0.9,  fillColor: '#4caf50', fillOpacity: 0.4  };

// Provinciegrenzen — cartomap.github.io (MIT, WGS84, CORS-enabled)
// Data wordt ook bewaard voor de provincies-quiz (set 54).
let provinceFeatureData = null;
let provinceLayers = {};    // statnaam → Leaflet layer (alleen actief tijdens province-quiz)
let provinceQuizLayer = null;

const provinceDataPromise = fetch('https://cartomap.github.io/nl/wgs84/provincie_2023.geojson')
  .then(r => r.json())
  .then(data => {
    provinceFeatureData = data;
    L.geoJSON(data, { style: PROV_BORDER, interactive: false }).addTo(map);
  });

// Bouw een interactieve provincielaag voor de quiz (één keer per speelsessie).
function buildProvinceLayer() {
  if (provinceQuizLayer) { map.removeLayer(provinceQuizLayer); }
  provinceLayers = {};
  provinceQuizLayer = L.geoJSON(provinceFeatureData, {
    style: PROV_DEFAULT,
    interactive: false,
    onEachFeature: (feature, layer) => {
      const name = feature.properties.statnaam;
      if (name) provinceLayers[name] = layer;
    },
  }).addTo(map);
}

function setHighlightProvince(province) {
  Object.entries(provinceLayers).forEach(([name, layer]) => {
    layer.setStyle(name === province.name
      ? PROV_HIGHLIGHT
      : (streak[name] >= mastery() ? PROV_MASTERED : PROV_DEFAULT));
  });
  if (provinceLayers[province.name]) provinceLayers[province.name].bringToFront();
  const latlng = [province.lat, province.lon];
  if (!map.getBounds().contains(latlng)) map.panTo(latlng, { animate: true });
}

map.fitBounds(NL_BOUNDS, { padding: [4, 4], maxZoom: 8 });

const NORMAL_STYLE   = { color: '#1a2744', weight: 1.5, fillColor: '#4a5a80', fillOpacity: 0.9 };
const MASTERED_STYLE = { color: '#1b5e20', weight: 1.5, fillColor: '#4caf50', fillOpacity: 1   };

const markerLayer = L.layerGroup().addTo(map);

const pulseIcon = L.divIcon({
  className: '',
  html: '<div class="pulse-wrap"><div class="pulse-ring"></div><div class="pulse-dot"></div></div>',
  iconSize: [0, 0], iconAnchor: [0, 0],
});
let highlightMarker = null;

function setHighlight(city) {
  if (highlightMarker) map.removeLayer(highlightMarker);
  highlightMarker = L.marker([city.lat, city.lon], { icon: pulseIcon, interactive: false }).addTo(map);
  if (!map.getBounds().contains([city.lat, city.lon])) {
    map.panTo([city.lat, city.lon], { animate: true });
  }
}

// ── Game state ──────────────────────────────────────────────
const MASTERY_MC   = 3; // meerkeuze: 3× goed
const MASTERY_TEXT = 1; // typen: 1× goed
function mastery() { return gameMode === 'text' ? MASTERY_TEXT : MASTERY_MC; }
let activeCities = [];
let gameMode = 'mc';
let streak = {}, sessionOk = 0, sessionErr = 0;
let currentCity = null, answered = false;
let hintRevealed = 0; // aantal tekens van de hint dat getoond is

// ── Text answer helpers ──────────────────────────────────────

// Normaliseer voor vergelijking: lowercase, trim, verwijder '-/'/spaties
function normalize(s) {
  return s.toLowerCase().trim().replace(/['\-\s]/g, '');
}

// Levenshtein afstand tussen twee strings
function levenshtein(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({ length: m + 1 }, (_, i) => [i]);
  for (let j = 0; j <= n; j++) dp[0][j] = j;
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = a[i-1] === b[j-1]
        ? dp[i-1][j-1]
        : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
  return dp[m][n];
}

// Maximaal toegestane typefouten op basis van naamlengte (na normalisatie)
function typoThreshold(normalizedName) {
  const l = normalizedName.length;
  if (l <= 4) return 0;
  if (l <= 8) return 1;
  return 2;
}

// Geeft 'exact', 'close' of false terug
function matchInput(input, city) {
  const normInput = normalize(input);
  if (!normInput) return false;

  // Controleer exacte naam + aliassen
  const allNames = [city.name, ...(city.aliases || [])];
  for (const name of allNames) {
    if (normalize(name) === normInput) return 'exact';
  }

  // Fuzzy match op naam en aliassen
  for (const name of allNames) {
    const normName = normalize(name);
    const dist = levenshtein(normInput, normName);
    if (dist <= typoThreshold(normName)) return 'close';
  }

  return false;
}

// ── Hint ────────────────────────────────────────────────────

// Maximaal te onthullen tekens (helft van de naam, afgerond naar boven, max 4)
function maxHintChars(city) {
  return Math.min(Math.ceil(city.name.length / 2), 4);
}

function showHint() {
  if (answered) return;
  hintRevealed = Math.min(hintRevealed + 1, maxHintChars(currentCity));
  const shown = currentCity.name.slice(0, hintRevealed);
  const dots  = '…';
  document.getElementById('hint-display').textContent = `Hint: ${shown}${dots}`;
  if (hintRevealed >= maxHintChars(currentCity)) {
    document.getElementById('hint-btn').disabled = true;
  }
  document.getElementById('city-input').focus();
}

// ── Core game logic ──────────────────────────────────────────

function masteredCount() {
  return activeCities.filter(c => streak[c.name] >= mastery()).length;
}

function initLevel(setNumber) {
  markerLayer.clearLayers();
  if (highlightMarker) { map.removeLayer(highlightMarker); highlightMarker = null; }
  if (provinceQuizLayer) { map.removeLayer(provinceQuizLayer); provinceQuizLayer = null; provinceLayers = {}; }

  if (SETS[setNumber].quizType === 'province') {
    activeCities = ALL_PROVINCES;
    buildProvinceLayer();
  } else {
    activeCities = ALL_CITIES.filter(c => c.sets.includes(setNumber));
    activeCities.forEach(c => {
      c._hadWrong = false;
      if (c.capital) {
        const s = cityRadius(c) * 2;
        const icon = L.divIcon({
          className: '',
          html: `<div class="capital-marker" style="width:${s}px;height:${s}px"></div>`,
          iconSize: [s, s], iconAnchor: [s / 2, s / 2],
        });
        c.marker = L.marker([c.lat, c.lon], { icon, interactive: false }).addTo(markerLayer);
        c.marker.setStyle = function(style) {
          const el = this.getElement()?.querySelector('.capital-marker');
          if (!el) return;
          el.style.backgroundColor = style.fillColor;
          el.style.borderColor     = style.color;
        };
      } else {
        c.marker = L.circleMarker([c.lat, c.lon], { ...NORMAL_STYLE, radius: cityRadius(c), interactive: false })
          .addTo(markerLayer);
      }
    });
  }
}

function initStreak() {
  streak = {};
  activeCities.forEach(c => {
    streak[c.name] = 0;
    c._hadWrong = false;
    if (c.marker) c.marker.setStyle({ ...NORMAL_STYLE, radius: cityRadius(c) });
    if (provinceLayers[c.name]) provinceLayers[c.name].setStyle(PROV_DEFAULT);
  });
}

function buildPool() {
  const pool = [];
  activeCities.forEach(c => {
    const s = streak[c.name];
    if (s >= mastery()) return;
    for (let i = 0; i < mastery() - s; i++) pool.push(c);
  });
  return pool;
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function pickCity() {
  const pool = buildPool();
  let city;
  do { city = pool[Math.floor(Math.random() * pool.length)]; }
  while (city === currentCity && pool.length > 1);
  return city;
}

function dist(a, b) {
  const dlat = a.lat - b.lat, dlon = a.lon - b.lon;
  return dlat * dlat + dlon * dlon;
}

function nearbyDistractors(city, n) {
  const sorted = activeCities.filter(c => c !== city)
                             .sort((a, b) => dist(a, city) - dist(b, city));
  const candidates = sorted.slice(0, Math.min(8, sorted.length));
  return shuffle(candidates).slice(0, n);
}

function renderQuestion() {
  document.activeElement?.blur();
  answered = false;
  hintRevealed = 0;
  currentCity = pickCity();

  const isProvince = SETS[selectedSet].quizType === 'province';
  document.getElementById('question-text').textContent = isProvince ? 'Welke provincie is dit?' : 'Welke plaats is dit?';
  if (isProvince) {
    if (highlightMarker) { map.removeLayer(highlightMarker); highlightMarker = null; }
    setHighlightProvince(currentCity);
  } else {
    setHighlight(currentCity);
  }

  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className   = '';
  document.getElementById('next-btn').style.display = 'none';

  if (gameMode === 'mc') {
    const options = shuffle([currentCity, ...nearbyDistractors(currentCity, 3)]);
    const optDiv = document.getElementById('options');
    optDiv.innerHTML = '';
    options.forEach(c => {
      const btn = document.createElement('button');
      btn.className = 'opt';
      btn.textContent = c.name;
      btn.onclick = () => checkMcAnswer(c, btn);
      optDiv.appendChild(btn);
    });
  } else {
    document.getElementById('hint-display').textContent = '';
    document.getElementById('hint-btn').disabled = false;
    const input = document.getElementById('city-input');
    input.value = '';
    input.disabled = false;
    setTimeout(() => input.focus(), 50);
  }
}

// ── Multiple choice answer ───────────────────────────────────

function checkMcAnswer(chosen, btn) {
  if (answered) return;
  answered = true;
  const correct = currentCity;

  document.querySelectorAll('.opt').forEach(b => {
    b.disabled = true;
    if (b.textContent === correct.name) b.classList.add('correct');
  });

  const fb = document.getElementById('feedback');
  if (chosen === correct) {
    btn.classList.add('correct');
    recordCorrect(correct, fb);
  } else {
    btn.classList.add('wrong');
    recordWrong(correct, fb);
  }

  finishAnswer();
}

// ── Text input answer ────────────────────────────────────────

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('city-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !answered && gameMode === 'text') checkTextAnswer();
  });
});

function checkTextAnswer() {
  if (answered) return;
  const input = document.getElementById('city-input');
  const value = input.value;
  if (!value.trim()) return;

  answered = true;
  input.disabled = true;
  document.getElementById('hint-btn').disabled = true;

  const correct = currentCity;
  const result  = matchInput(value, correct);
  const fb      = document.getElementById('feedback');

  if (result === 'exact') {
    recordCorrect(correct, fb);
  } else if (result === 'close') {
    recordCorrect(correct, fb, true);
  } else {
    recordWrong(correct, fb);
  }

  finishAnswer();
}

// ── Shared result helpers ────────────────────────────────────

function recordCorrect(city, fb, close = false) {
  streak[city.name]++;
  sessionOk++;
  if (streak[city.name] >= mastery()) {
    if (city.marker) city.marker.setStyle({ ...MASTERED_STYLE, radius: cityRadius(city) });
    if (provinceLayers[city.name]) provinceLayers[city.name].setStyle(PROV_MASTERED);
    fb.innerHTML = close
      ? `😊 Bijna! Het heet <strong>${city.name}</strong> — let de volgende keer op de spelling. 🌟`
      : `🌟 Yes! <span style="color:#f0c040">${city.name} zit in je hoofd! ⭐</span>`;
    fb.className = close ? 'fb-close' : 'fb-ok';
  } else {
    fb.innerHTML = close
      ? `😊 Bijna! Het heet <strong>${city.name}</strong> — let de volgende keer op de spelling.`
      : `✅ Goed! Nog ${mastery() - streak[city.name]} keer, dan ken je 'm! 💪`;
    fb.className = close ? 'fb-close' : 'fb-ok';
  }
  updateScoreboard();
  saveProgress();
}

function recordWrong(city, fb) {
  streak[city.name] = 0;
  city._hadWrong = true;
  sessionErr++;
  fb.textContent = `Helaas! 😅 Het was ${city.name}. Komt nog terug!`;
  fb.className = 'fb-err';
  updateScoreboard();
  saveProgress();
}

function updateScoreboard() {
  const mc = masteredCount();
  document.getElementById('sc-ok').textContent       = sessionOk;
  document.getElementById('sc-err').textContent      = sessionErr;
  document.getElementById('sc-mastered').textContent = mc;
  document.getElementById('progress-bar').style.width = Math.round(mc / activeCities.length * 100) + '%';
  updateHardList();
}

function finishAnswer() {
  const mc = masteredCount();
  setTimeout(mc >= activeCities.length ? showEnd : renderQuestion, 2000);
}

function updateHardList() {
  const panel = document.getElementById('hard-panel');
  const hard  = activeCities.filter(c => c._hadWrong && streak[c.name] < mastery())
                      .sort((a, b) => streak[a.name] - streak[b.name]);
  if (!hard.length) { panel.style.display = 'none'; return; }
  panel.style.display = 'block';
  document.getElementById('hard-list').innerHTML = hard.map(c =>
    `<li>${c.name} <b>${'●'.repeat(streak[c.name])}${'○'.repeat(mastery() - streak[c.name])}</b></li>`
  ).join('');
}

// ── Screens ──────────────────────────────────────────────────

function showEnd() {
  clearSavedProgress(); // quiz voltooid: voortgang niet meer nodig
  ['map-wrap','question-box','hard-panel','score-bar'].forEach(id =>
    document.getElementById(id).style.display = 'none');
  document.getElementById('end-screen').style.display = 'block';
  const total = sessionOk + sessionErr;
  const pct   = total ? Math.round(sessionOk / total * 100) : 100;
  const isProvince = SETS[selectedSet].quizType === 'province';
  document.getElementById('end-text').innerHTML =
    `Je kent nu alle <strong>${activeCities.length} ${isProvince ? 'provincies' : 'plaatsen'}</strong>! 🗺️<br>Je had ${sessionOk} van de ${total} goed — ${pct}% raak! 🎯`;
}

let selectedSet = 54;

// ── Internal render helpers (geen history-aanpassingen) ──────

function _renderLevelSelect() {
  const el = document.getElementById('level-select');
  el.innerHTML = '<h2>🗺️ Topografie Quiz</h2><p>Oefen de topografie van Nederland op je eigen tempo. Kies hieronder de toets waarvoor je wilt oefenen:</p>';
  Object.entries(SETS).forEach(([num, set]) => {
    const btn = document.createElement('button');
    btn.className = 'mode-btn';
    btn.textContent = set.name;
    btn.onclick = () => selectLevel(Number(num));
    el.appendChild(btn);
  });
  document.getElementById('level-select').style.display = 'block';
  document.getElementById('mode-select').style.display  = 'none';
}

function _renderModeSelect(setNumber) {
  // Ruim kaartlagen op als de gebruiker vanuit een quiz terugkomt
  if (provinceQuizLayer) { map.removeLayer(provinceQuizLayer); provinceQuizLayer = null; provinceLayers = {}; }
  if (highlightMarker)   { map.removeLayer(highlightMarker); highlightMarker = null; }
  markerLayer.clearLayers();

  ['end-screen', 'map-wrap', 'question-box', 'score-bar', 'hard-panel'].forEach(id =>
    document.getElementById(id).style.display = 'none');
  document.getElementById('start-screen').style.display = 'block';
  document.querySelector('h1').textContent = '🗺️ Topografie Quiz';

  document.getElementById('start-level-name').textContent = `🗺️ ${SETS[setNumber].name}`;
  document.getElementById('level-select').style.display = 'none';
  document.getElementById('mode-select').style.display  = 'block';

  const isProvince = SETS[setNumber].quizType === 'province';
  const descs = document.querySelectorAll('#mode-select .mode-desc');
  descs[0].textContent = isProvince
    ? 'Je ziet een provincie gekleurd op de kaart en kiest de juiste naam uit vier opties. Goed om te beginnen!'
    : 'Je ziet een stip op de kaart en kiest de juiste naam uit vier opties. Goed om te beginnen!';
  descs[1].textContent = isProvince
    ? 'Je typt de naam van de provincie zelf in. Ook de spelling telt — net als op de echte toets!'
    : 'Je typt de naam van de plaats zelf in. Ook de spelling telt — net als op de echte toets! Hints beschikbaar.';
}

// ── Publieke navigatiefuncties (met history) ─────────────────

function selectLevel(setNumber) {
  selectedSet = setNumber;
  history.pushState({ screen: 'mode-select', set: setNumber }, '');
  _renderModeSelect(setNumber);
}

// ── Feedback ──────────────────────────────────────────────────────────────────
const FB_ENDPOINT = 'https://docs.google.com/forms/d/e/1FAIpQLSfnhQtTQ63otSzqHKqQPGcyTvhhlztr6IQNHMD3Zwg_f7gU7Q/formResponse';
let fbType = 'Bug 🐛';

function openFeedback() {
  fbType = 'Bug 🐛';
  document.querySelectorAll('.fb-type-btn').forEach((b, i) => b.classList.toggle('selected', i === 0));
  document.getElementById('fb-desc').value = '';
  document.getElementById('fb-name').value = '';
  document.getElementById('fb-form').style.display  = '';
  document.getElementById('fb-thanks').style.display = 'none';
  document.getElementById('fb-submit').disabled = false;
  document.getElementById('fb-overlay').classList.add('open');
}

function closeFeedback() {
  document.getElementById('fb-overlay').classList.remove('open');
}

function selectFbType(btn, type) {
  fbType = type;
  document.querySelectorAll('.fb-type-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}

function submitFeedback() {
  const desc = document.getElementById('fb-desc').value.trim();
  if (!desc) { document.getElementById('fb-desc').focus(); return; }

  const name    = document.getElementById('fb-name').value.trim();
  const level   = SETS[selectedSet] ? SETS[selectedSet].name : '—';
  const context = `Level: ${level} | Modus: ${gameMode || '—'}`;
  const body    = `${desc}\n\n— ${context}`;

  const data = new URLSearchParams();
  data.append('entry.1776174070', fbType);
  data.append('entry.686569598',  body);
  data.append('entry.45677083',   name);

  document.getElementById('fb-submit').disabled = true;
  fetch(FB_ENDPOINT, { method: 'POST', mode: 'no-cors', body: data })
    .finally(() => {
      document.getElementById('fb-form').style.display   = 'none';
      document.getElementById('fb-thanks').style.display = 'block';
      setTimeout(closeFeedback, 2000);
    });
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeFeedback(); });

function _renderStartScreen() {
  if (provinceQuizLayer) { map.removeLayer(provinceQuizLayer); provinceQuizLayer = null; provinceLayers = {}; }
  if (highlightMarker)   { map.removeLayer(highlightMarker); highlightMarker = null; }
  markerLayer.clearLayers();
  ['end-screen', 'map-wrap', 'question-box', 'score-bar', 'hard-panel'].forEach(id =>
    document.getElementById(id).style.display = 'none');
  document.getElementById('start-screen').style.display = 'block';
  document.querySelector('h1').textContent = '🗺️ Topografie Quiz';
  _renderLevelSelect();
}

function showStartScreen() {
  // replaceState: terugknop vanuit startscherm verlaat de pagina (zoals verwacht),
  // niet terug naar een verlaten quiz.
  history.replaceState({ screen: 'level-select' }, '');
  _renderStartScreen();
}

async function startQuiz(mode) {
  gameMode = mode;
  history.pushState({ screen: 'quiz', set: selectedSet, mode }, '');
  if (SETS[selectedSet].quizType === 'province') await provinceDataPromise;
  initLevel(selectedSet);

  // Toon/verberg de juiste invoer-UI
  document.getElementById('options').style.display         = mode === 'mc'   ? '' : 'none';
  document.getElementById('text-input-wrap').style.display = mode === 'text' ? 'block' : 'none';

  // Herstel eerdere sessie als die er is, anders begin vers
  const restored = restoreProgress();
  if (!restored) {
    initStreak();
    sessionOk = sessionErr = 0;
  } else {
    // Herstel visuele staat van gememoreerde plaatsen/provincies
    activeCities.forEach(c => {
      if (streak[c.name] >= mastery()) {
        if (c.marker) c.marker.setStyle({ ...MASTERED_STYLE, radius: cityRadius(c) });
        if (provinceLayers[c.name]) provinceLayers[c.name].setStyle(PROV_MASTERED);
      }
    });
    updateHardList();
  }
  currentCity = null;

  document.getElementById('sc-ok').textContent       = sessionOk;
  document.getElementById('sc-err').textContent      = sessionErr;
  document.getElementById('sc-mastered').textContent = masteredCount();
  document.getElementById('progress-bar').style.width =
    Math.round(masteredCount() / activeCities.length * 100) + '%';

  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('end-screen').style.display   = 'none';
  document.getElementById('hard-panel').style.display   = 'none';
  document.getElementById('map-wrap').style.display     = 'block';
  map.invalidateSize();
  if (SETS[selectedSet].fitOnStart)
    map.fitBounds(L.latLngBounds(activeCities.map(c => [c.lat, c.lon])), { padding: [40, 40], maxZoom: 11 });
  else
    map.fitBounds(NL_BOUNDS, { padding: [4, 4], maxZoom: 8 });
  document.getElementById('question-box').style.display = 'block';
  document.getElementById('score-bar').style.display    = 'flex';
  document.getElementById('qtot').textContent = activeCities.length;
  document.querySelector('h1').textContent = `🗺️ ${SETS[selectedSet].name}`;

  renderQuestion();
}

// ── Voortgang opslaan in sessionStorage ──────────────────────
// Gesaved per combinatie van level + modus, zodat terugnavigeren
// de quiz herstelt naar het punt waar de gebruiker was.

function saveProgress() {
  const hadWrong = {};
  activeCities.forEach(c => { hadWrong[c.name] = c._hadWrong; });
  try {
    sessionStorage.setItem(
      `qp_${selectedSet}_${gameMode}`,
      JSON.stringify({ streak, sessionOk, sessionErr, hadWrong })
    );
  } catch (_) {}
}

function restoreProgress() {
  try {
    const saved = JSON.parse(sessionStorage.getItem(`qp_${selectedSet}_${gameMode}`));
    if (!saved) return false;
    streak     = saved.streak     || {};
    sessionOk  = saved.sessionOk  || 0;
    sessionErr = saved.sessionErr || 0;
    // Zorg dat elke actieve stad/provincie een streak-waarde heeft
    activeCities.forEach(c => { if (!(c.name in streak)) streak[c.name] = 0; });
    if (saved.hadWrong) {
      activeCities.forEach(c => { c._hadWrong = saved.hadWrong[c.name] || false; });
    }
    return true;
  } catch (_) { return false; }
}

function clearSavedProgress() {
  try { sessionStorage.removeItem(`qp_${selectedSet}_${gameMode}`); } catch (_) {}
}

function resetQuiz() {
  clearSavedProgress();
  startQuiz(gameMode);
}

// ── Browser-navigatie (terug/vooruit-knop) ───────────────────

window.addEventListener('popstate', e => {
  const s = e.state;
  if (!s || s.screen === 'level-select') {
    _renderStartScreen();
  } else if (s.screen === 'mode-select' || s.screen === 'quiz') {
    // quiz-state via popstate = gebruiker navigeerde terug vanuit de quiz;
    // toon het moduscherm zodat ze hun voortgang kunnen hervatten.
    selectedSet = s.set;
    _renderModeSelect(s.set);
  }
});

// Geef de initiële paginastate een naam zodat popstate correct werkt
history.replaceState({ screen: 'level-select' }, '');

showStartScreen();
</script>
