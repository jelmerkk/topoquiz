<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Topografie Quiz – Grote Steden</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', sans-serif;
  background: #1a2744;
  color: #fff;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 10px;
  gap: 8px;
}
h1 { font-size: 1rem; color: #f0c040; text-align: center; }

#score-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  width: 100%;
  max-width: 680px;
  font-size: 0.9rem;
  color: #8ab4f8;
  gap: 8px;
}
#progress-wrap {
  flex: 1;
  background: #0e1830;
  border-radius: 8px;
  height: 8px;
  overflow: hidden;
}
#progress-bar {
  height: 100%;
  background: linear-gradient(90deg, #4caf50, #8bc34a);
  border-radius: 8px;
  transition: width 0.5s;
  width: 0%;
}
.sc-mastered { color: #4caf50; font-weight: 700; }
.sc-ok  { color: #4caf50; font-weight: 700; }
.sc-err { color: #f44336; font-weight: 700; }

#map-wrap {
  width: 100%;
  max-width: 680px;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
#leaflet-map {
  height: clamp(300px, 52dvh, 580px);
  width: 100%;
}
.leaflet-control-attribution { font-size: 9px !important; }

.pulse-wrap { position: relative; width: 0; height: 0; }
.pulse-ring {
  position: absolute;
  width: 30px; height: 30px;
  border: 3px solid #f44336;
  border-radius: 50%;
  top: -15px; left: -15px;
  animation: pulse 1.4s ease-out infinite;
  pointer-events: none;
}
.pulse-dot {
  position: absolute;
  width: 14px; height: 14px;
  background: #f44336;
  border: 2px solid #fff;
  border-radius: 50%;
  top: -7px; left: -7px;
  box-shadow: 0 0 6px rgba(0,0,0,0.5);
}
@keyframes pulse {
  0%   { transform: scale(0.5); opacity: 1; }
  100% { transform: scale(2.4); opacity: 0; }
}

#question-box {
  background: #243060;
  border-radius: 12px;
  padding: 14px 18px;
  width: 100%;
  max-width: 680px;
  text-align: center;
}
#question-text {
  font-size: 1rem;
  color: #c8d8f8;
  margin-bottom: 12px;
  font-weight: 600;
}
#options {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 10px;
}
.opt {
  background: #1a2744;
  border: 2px solid #3a4f88;
  color: #fff;
  padding: 11px 8px;
  border-radius: 9px;
  font-size: 0.92rem;
  cursor: pointer;
  transition: all 0.12s;
  font-weight: 500;
  line-height: 1.2;
}
.opt:hover:not(:disabled) { background: #2c3d6e; border-color: #6080cc; }
.opt.correct { background: #1b5e20; border-color: #4caf50; }
.opt.wrong   { background: #b71c1c; border-color: #f44336; }
.opt:disabled { cursor: default; }

#feedback {
  font-size: 0.95rem;
  font-weight: 600;
  min-height: 22px;
  margin-bottom: 8px;
}
.fb-ok  { color: #4caf50; }
.fb-err { color: #f44336; }

#next-btn { display: none; }

#hard-panel {
  display: none;
  background: #243060;
  border-radius: 10px;
  padding: 10px 14px;
  width: 100%;
  max-width: 680px;
}
#hard-panel h3 { color: #f0c040; font-size: 0.85rem; margin-bottom: 6px; }
#hard-list { list-style: none; display: flex; flex-wrap: wrap; gap: 5px; }
#hard-list li {
  background: #b71c1c33;
  border: 1px solid #f4433644;
  padding: 2px 9px;
  border-radius: 20px;
  font-size: 0.8rem;
  color: #ef9a9a;
}
#hard-list li b { color: #fff; }

#end-screen {
  display: none;
  background: #243060;
  border-radius: 16px;
  padding: 36px 28px;
  text-align: center;
  max-width: 680px;
  width: 100%;
}
#end-screen h2 { font-size: 2rem; color: #f0c040; margin-bottom: 12px; }
#end-screen p  { color: #8ab4f8; margin-bottom: 24px; font-size: 1.05rem; line-height: 1.6; }
#restart-btn {
  padding: 13px 30px;
  background: #f0c040;
  color: #1a2744;
  border: none;
  border-radius: 10px;
  font-size: 1.05rem;
  font-weight: 700;
  cursor: pointer;
}

/* Tablet (768px+): bredere layout, grotere kaart */
@media (min-width: 768px) {
  body { padding: 14px; gap: 12px; }
  h1 { font-size: 1.3rem; }
  #map-wrap, #question-box, #score-bar, #hard-panel, #end-screen { max-width: 900px; }
  #leaflet-map { height: clamp(500px, 66dvh, 740px); }
}

/* Mobiel (<= 480px): vul het volledige scherm, kaart groeit mee */
@media (max-width: 480px) {
  body { padding: 6px; gap: 5px; height: 100dvh; overflow: hidden; }
  h1 { font-size: 0.82rem; }
  #score-bar { font-size: 0.78rem; gap: 5px; }
  #map-wrap { flex: 1; min-height: 0; }
  #leaflet-map { height: 100%; }
  #question-box { padding: 9px 11px; }
  #question-text { font-size: 0.88rem; margin-bottom: 8px; }
  #options { gap: 6px; margin-bottom: 7px; }
  .opt { padding: 9px 6px; font-size: 0.82rem; }
  #feedback { font-size: 0.82rem; min-height: 18px; margin-bottom: 5px; }
  #next-btn { padding: 9px; font-size: 0.9rem; }
}
</style>
</head>
<body>

<h1>🗺️ Topografie Quiz — Grote steden</h1>

<div id="score-bar">
  <span>🎓 <span id="sc-mastered" class="sc-mastered">0</span>/<b id="qtot">46</b> geleerd</span>
  <div id="progress-wrap"><div id="progress-bar"></div></div>
  <span>✅ <span id="sc-ok" class="sc-ok">0</span> &nbsp;❌ <span id="sc-err" class="sc-err">0</span></span>
</div>

<div id="map-wrap">
  <div id="leaflet-map"></div>
</div>

<div id="question-box">
  <div id="question-text">Welke stad is dit?</div>
  <div id="options"></div>
  <div id="feedback"></div>
  <button id="next-btn">Volgende →</button>
</div>

<div id="hard-panel">
  <h3>⚠️ Lastige steden – komen vaker terug</h3>
  <ul id="hard-list"></ul>
</div>

<div id="end-screen">
  <h2>🎉 Alle steden geleerd!</h2>
  <p id="end-text"></p>
  <button id="restart-btn" onclick="startQuiz()">Opnieuw spelen</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="cities.js"></script>
<script>
const CITIES = ALL_CITIES.filter(c => c.sets.includes(1));

const NL_BOUNDS = [[50.699, 3.325], [53.566, 7.261]];

const map = L.map('leaflet-map', {
  zoomControl: true,
  dragging: true,
  scrollWheelZoom: true,
  doubleClickZoom: true,
  boxZoom: false,
  keyboard: false,
  touchZoom: true,
});

// FEATURE FLAG: zet op true voor CARTO Positron tiles (geen plaatsnamen, open-source)
//               zet op false voor originele TopoMania tiles
// Let op: donkere kaart (dark_nolabels) is NIET geschikt — doelgroep zijn kinderen in groep 5
// die de kaart moeten kunnen herkennen. Gebruik altijd een lichte, vertrouwde kaartstijl.
const USE_CARTO_TILES = true;

const tileLayer = USE_CARTO_TILES
  ? L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
      attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors © <a href="https://carto.com/">CARTO</a>',
      subdomains: 'abcd',
      minZoom: 6, maxZoom: 19,
    })
  : L.tileLayer('https://www.topomania.net/styles/topomania-nonames/{z}/{x}/{y}.png', {
      attribution: '© <a href="https://www.topomania.net">TopoMania</a>',
      minZoom: 6, maxZoom: 10,
    });

tileLayer.addTo(map);

map.fitBounds(NL_BOUNDS, { padding: [4, 4], maxZoom: 8 });

const NORMAL_STYLE   = { color: '#1a2744', weight: 1.5, fillColor: '#4a5a80', fillOpacity: 0.9 };
const MASTERED_STYLE = { color: '#1b5e20', weight: 1.5, fillColor: '#4caf50', fillOpacity: 1   };

CITIES.forEach(c => {
  c.marker = L.circleMarker([c.lat, c.lon], { ...NORMAL_STYLE, radius: cityRadius(c), interactive: false }).addTo(map);
});

const pulseIcon = L.divIcon({
  className: '',
  html: '<div class="pulse-wrap"><div class="pulse-ring"></div><div class="pulse-dot"></div></div>',
  iconSize: [0, 0], iconAnchor: [0, 0],
});
let highlightMarker = null;

function setHighlight(city) {
  if (highlightMarker) map.removeLayer(highlightMarker);
  highlightMarker = L.marker([city.lat, city.lon], { icon: pulseIcon, interactive: false }).addTo(map);
}

const MASTERY = 3;
const TOTAL   = CITIES.length;
let streak = {}, sessionOk = 0, sessionErr = 0;
let currentCity = null, answered = false;

function masteredCount() {
  return CITIES.filter(c => streak[c.name] >= MASTERY).length;
}

function initStreak() {
  streak = {};
  CITIES.forEach(c => { streak[c.name] = 0; c._hadWrong = false; c.marker.setStyle({ ...NORMAL_STYLE, radius: cityRadius(c) }); });
}

function buildPool() {
  const pool = [];
  CITIES.forEach(c => {
    const s = streak[c.name];
    if (s >= MASTERY) return;
    for (let i = 0; i < MASTERY - s; i++) pool.push(c);
  });
  return pool;
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function pickCity() {
  const pool = buildPool();
  let city;
  do { city = pool[Math.floor(Math.random() * pool.length)]; }
  while (city === currentCity && pool.length > 1);
  return city;
}

function dist(a, b) {
  const dlat = a.lat - b.lat, dlon = a.lon - b.lon;
  return dlat * dlat + dlon * dlon;
}

function nearbyDistractors(city, n) {
  const sorted = CITIES.filter(c => c !== city)
                       .sort((a, b) => dist(a, city) - dist(b, city));
  // Pick from the closest candidates, with some randomness to vary the pool
  const candidates = sorted.slice(0, Math.min(8, sorted.length));
  return shuffle(candidates).slice(0, n);
}

function renderQuestion() {
  document.activeElement?.blur();
  answered = false;
  currentCity = pickCity();
  setHighlight(currentCity);

  const options = shuffle([currentCity, ...nearbyDistractors(currentCity, 3)]);
  const optDiv = document.getElementById('options');
  optDiv.innerHTML = '';
  options.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.textContent = c.name;
    btn.onclick = () => checkAnswer(c, btn);
    optDiv.appendChild(btn);
  });
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className   = '';
  document.getElementById('next-btn').style.display = 'none';
}

function checkAnswer(chosen, btn) {
  if (answered) return;
  answered = true;
  const correct = currentCity;

  document.querySelectorAll('.opt').forEach(b => {
    b.disabled = true;
    if (b.textContent === correct.name) b.classList.add('correct');
  });

  const fb = document.getElementById('feedback');
  if (chosen === correct) {
    btn.classList.add('correct');
    streak[correct.name]++;
    sessionOk++;
    if (streak[correct.name] >= MASTERY) {
      correct.marker.setStyle({ ...MASTERED_STYLE, radius: cityRadius(correct) });
      fb.innerHTML = `✅ Goed! <span style="color:#f0c040">⭐ ${correct.name} geleerd!</span>`;
    } else {
      fb.textContent = `✅ Goed! (nog ${MASTERY - streak[correct.name]}× voor volledig geleerd)`;
    }
    fb.className = 'fb-ok';
  } else {
    btn.classList.add('wrong');
    streak[correct.name] = 0;
    correct._hadWrong = true;
    sessionErr++;
    fb.textContent = `❌ Fout — het was ${correct.name}`;
    fb.className = 'fb-err';
  }

  const mc = masteredCount();
  document.getElementById('sc-ok').textContent       = sessionOk;
  document.getElementById('sc-err').textContent      = sessionErr;
  document.getElementById('sc-mastered').textContent = mc;
  document.getElementById('progress-bar').style.width = Math.round(mc / TOTAL * 100) + '%';
  updateHardList();

  setTimeout(mc >= TOTAL ? showEnd : renderQuestion, 2000);
}

function updateHardList() {
  const panel = document.getElementById('hard-panel');
  const hard  = CITIES.filter(c => c._hadWrong && streak[c.name] < MASTERY)
                      .sort((a, b) => streak[a.name] - streak[b.name]);
  if (!hard.length) { panel.style.display = 'none'; return; }
  panel.style.display = 'block';
  document.getElementById('hard-list').innerHTML = hard.map(c =>
    `<li>${c.name} <b>${'●'.repeat(streak[c.name])}${'○'.repeat(MASTERY - streak[c.name])}</b></li>`
  ).join('');
}

function showEnd() {
  ['map-wrap','question-box','hard-panel','score-bar'].forEach(id =>
    document.getElementById(id).style.display = 'none');
  document.getElementById('end-screen').style.display = 'block';
  const total = sessionOk + sessionErr;
  const pct   = total ? Math.round(sessionOk / total * 100) : 100;
  document.getElementById('end-text').innerHTML =
    `🌟 Alle <strong>${TOTAL} steden</strong> geleerd!<br>${sessionOk} goed van ${total} pogingen — ${pct}% raak`;
}

function startQuiz() {
  initStreak();
  sessionOk = sessionErr = 0;
  currentCity = null;
  ['sc-ok','sc-err','sc-mastered'].forEach(id => document.getElementById(id).textContent = '0');
  document.getElementById('progress-bar').style.width = '0%';
  document.getElementById('end-screen').style.display  = 'none';
  document.getElementById('hard-panel').style.display  = 'none';
  document.getElementById('map-wrap').style.display    = 'block';
  document.getElementById('question-box').style.display = 'block';
  document.getElementById('score-bar').style.display   = 'flex';
  document.getElementById('qtot').textContent = TOTAL;
  renderQuestion();
}

startQuiz();
</script>
</body>
</html>
