<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Routekaart-paper achtergrond -->
  <rect width="512" height="512" rx="96" ry="96" fill="#fffdf5"/>
  <!-- Ink-frame, chunky binnen-offset zodat maskable-crop hem niet opeet -->
